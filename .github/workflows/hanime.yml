name: Hanime1 Daily Videos

on:
  schedule:
#    - cron: '0 2,10,18 * * *'   # е§Јеї“гЃ‰ UTC 2:00, 10:00, 18:00 (йЌ–ж¤ѕеђ«йЏѓе •жЈї 10:00, 18:00, еЁ†в„ѓжЈ©2:00)
  workflow_dispatch:
  
concurrency:
  group: hanime1-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run main script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
        run: python main.py

      - name: Commit progress
        if: success() || failure()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add seen.txt title_translations.json
          git diff --staged --quiet || (git commit -m "Update progress [skip ci]" && git push)
